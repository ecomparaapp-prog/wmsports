openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: WM Sports API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      description: Returns all products in the catalog
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        driveUrl:
          type: string
          nullable: true
        basePrice:
          type: number
        price3:
          type: number
          nullable: true
          description: Price per item when buying 3+
        price5:
          type: number
          nullable: true
          description: Price per item when buying 5+
        allowPersonalization:
          type: boolean
        active:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - description
        - basePrice
        - allowPersonalization
        - active
        - sortOrder
        - createdAt
    CreateProduct:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        driveUrl:
          type: string
          nullable: true
        basePrice:
          type: number
        price3:
          type: number
          nullable: true
        price5:
          type: number
          nullable: true
        allowPersonalization:
          type: boolean
        active:
          type: boolean
        sortOrder:
          type: integer
      required:
        - name
        - category
        - description
        - basePrice
        - allowPersonalization
        - active
        - sortOrder
