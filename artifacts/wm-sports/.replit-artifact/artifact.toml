kind = "web"
previewPath = "/"
title = "WM Sports"
version = "1.0.0"
id = "artifacts/wm-sports"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20685
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/wm-sports run dev"

[services.env]
PORT = "20685"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/wm-sports", "run", "build"]
publicDir = "artifacts/wm-sports/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
